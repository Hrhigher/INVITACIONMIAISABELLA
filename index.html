  <style>
    :root {
      --poster-ratio: 3584 / 7767;
      --poster-max-width: 520px;
      --map-left: 18%;
      --map-top: 72.8%;
      --map-width: 62%;
      --map-height: 19.1%;
      --warm-orange: #f8ac6f;
      --soft-cream: #ffd24d;
      --soft-mint: #c9d238;
      --soft-coral: #ea907a;
      --button-orange: #eb2e84;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100dvh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 12%, rgba(248, 172, 111, .68) 0 20%, transparent 46%),
        radial-gradient(circle at 88% 17%, rgba(255, 211, 72, .38) 0 15%, transparent 42%),
        radial-gradient(circle at 18% 76%, rgba(235, 46, 132, .42) 0 18%, transparent 42%),
        radial-gradient(circle at 90% 84%, rgba(214, 106, 172, .58) 0 18%, transparent 42%),
        linear-gradient(160deg, #f8ac6f 0%, #f8a4d5 52%, #eb2e84 100%);
      background-attachment: fixed;
    }

    .page-shell {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(0px, 2.2vw, 24px);
    }

    .invitation {
      position: relative;
      width: min(100vw, calc((100dvh - clamp(0px, 4.4vw, 48px)) * (3584 / 7767)), var(--poster-max-width));
      aspect-ratio: var(--poster-ratio);
      overflow: hidden;
      border-radius: clamp(0px, 1.8vw, 18px);
      box-shadow: 0 20px 70px rgba(71, 42, 23, .28);
      background: #f8a4d5;
      isolation: isolate;
    }

    .invitation-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .map-card {
      position: absolute;
      left: var(--map-left);
      top: var(--map-top);
      width: var(--map-width);
      height: var(--map-height);
      z-index: 2;
      border-radius: 3.6cqw;
      overflow: hidden;
      background: #ea907a;
      box-shadow:
        0 .8cqw 2.4cqw rgba(0,0,0,.18),
        inset 0 0 0 .28cqw rgba(255,255,255,.22);
      transform: translateZ(0);
    }

    .map-card iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      filter: saturate(.94) sepia(.10) contrast(.96) brightness(1.03);
    }

    .location-button {
      position: absolute;
      right: 4.2%;
      top: 4.2%;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .35em;
      padding: .65em .92em .62em;
      border-radius: 999px;
      color: #eb2e84;
      background: rgba(255,255,255,.96);
      font-size: clamp(11px, 2.6cqw, 18px);
      line-height: 1;
      font-weight: 900;
      text-decoration: none;
      letter-spacing: .01em;
      box-shadow: 0 .55cqw 1.35cqw rgba(0,0,0,.22);
      backdrop-filter: blur(3px);
      animation: locationPulse 2.7s ease-in-out infinite;
    }

    .location-button:hover,
    .location-button:focus-visible {
      outline: none;
      transform: translateY(-.16cqw) scale(1.035);
      box-shadow: 0 .75cqw 1.8cqw rgba(0,0,0,.28);
    }

    .map-soft-glow {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255,255,255,.20), transparent 42%, rgba(235,46,132,.14));
      mix-blend-mode: soft-light;
    }

    @keyframes locationPulse {
      0%, 100% { scale: 1; }
      50% { scale: 1.055; }
    }

    @media (max-width: 640px) {
      .page-shell {
        display: block;
        padding: 0;
      }

      .invitation {
        width: 100vw;
        max-width: none;
        border-radius: 0;
        box-shadow: none;
      }
    }

    @media (min-width: 641px) and (max-height: 760px) {
      .page-shell { place-items: start center; }
    }



    /* ==========================================
       Opening animation: warm curtain + parallax reveal
       Designed to match the orange, cream, mint and coral tones.
       ========================================== */
    body.intro-active {
      overflow-x: hidden;
    }

    body.intro-active .invitation {
      animation: invitationReveal 3.65s cubic-bezier(.2,.72,.2,1) both;
      transform-origin: center center;
      will-change: transform, filter;
    }

    .intro-curtain {
      position: fixed;
      inset: 0;
      z-index: 9999;
      overflow: hidden;
      display: grid;
      place-items: center;
      min-height: 100dvh;
      pointer-events: auto;
      background:
        radial-gradient(circle at 13% 17%, rgba(255, 211, 72, .42) 0 12%, transparent 33%),
        radial-gradient(circle at 88% 82%, rgba(235, 46, 132, .46) 0 14%, transparent 35%),
        radial-gradient(circle at 75% 14%, rgba(255, 246, 250, .32) 0 10%, transparent 31%),
        linear-gradient(160deg, #f8ac6f 0%, #f89ccc 38%, #eb2e84 70%, #ea907a 100%);
      animation: introOverlayFadeOut 4.05s ease forwards;
    }

    .curtain-panel {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 55vw;
      min-width: 55%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 19%, rgba(255, 193, 91, .27) 0 13%, transparent 35%),
        radial-gradient(circle at 76% 72%, rgba(255, 255, 255, .14) 0 11%, transparent 32%),
        linear-gradient(145deg, #f8ac6f 0%, #eb2e84 55%, #d36aac 100%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12), 0 0 40px rgba(86, 45, 20, .20);
      will-change: transform;
      transform: translateX(0);
    }

    .curtain-panel::before,
    .curtain-panel::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      opacity: .42;
    }

    .curtain-panel::before {
      width: min(28vw, 210px);
      height: min(28vw, 210px);
      top: 14%;
      background: rgba(255, 246, 250, .32);
    }

    .curtain-panel::after {
      width: min(18vw, 130px);
      height: min(18vw, 130px);
      bottom: 15%;
      background: rgba(255, 211, 72, .26);
    }

    .curtain-left {
      left: 0;
      border-radius: 0 9vw 9vw 0 / 0 48% 52% 0;
      animation: curtainOpenLeft 2.2s cubic-bezier(.78,.02,.22,1) 1.05s forwards;
    }

    .curtain-left::before { left: 7%; }
    .curtain-left::after { right: 13%; }

    .curtain-right {
      right: 0;
      border-radius: 9vw 0 0 9vw / 48% 0 0 52%;
      animation: curtainOpenRight 2.2s cubic-bezier(.78,.02,.22,1) 1.05s forwards;
    }

    .curtain-right::before { right: 7%; }
    .curtain-right::after { left: 13%; }

    .curtain-leaf {
      position: absolute;
      z-index: 2;
      width: clamp(42px, 12vw, 104px);
      aspect-ratio: 1.9 / 1;
      border: 3px solid rgba(255,255,255,.66);
      border-left-color: transparent;
      border-bottom-color: rgba(255,255,255,.42);
      border-radius: 100% 0 100% 0;
      opacity: .58;
      transform-origin: center;
      animation: introLeafFloat 2.8s ease-in-out infinite;
    }

    .curtain-leaf::before {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      top: 50%;
      height: 2px;
      background: rgba(255,255,255,.55);
      transform: rotate(-18deg);
      transform-origin: left center;
    }

    .leaf-a { left: 7%; top: 24%; transform: rotate(-24deg); animation-delay: -.3s; }
    .leaf-b { right: 9%; top: 18%; transform: rotate(24deg); animation-delay: -.9s; }
    .leaf-c { left: 11%; bottom: 18%; transform: rotate(24deg); animation-delay: -1.4s; }
    .leaf-d { right: 10%; bottom: 24%; transform: rotate(-28deg); animation-delay: -.55s; }

    .intro-card {
      position: relative;
      z-index: 3;
      display: grid;
      justify-items: center;
      gap: .75rem;
      width: min(78vw, 380px);
      padding: 2rem 1.5rem 1.65rem;
      border-radius: 2rem;
      color: #fff;
      text-align: center;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.30);
      box-shadow: 0 1.2rem 3.2rem rgba(80,46,25,.28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: introCardOut .9s ease 1.75s forwards;
      will-change: transform, opacity;
    }

    .intro-envelope {
      width: clamp(82px, 22vw, 128px);
      aspect-ratio: 1.35 / 1;
      position: relative;
      border-radius: 1.2rem;
      background: rgba(255,255,255,.95);
      box-shadow: 0 .7rem 1.2rem rgba(92,54,31,.22);
      animation: envelopeBounce 1.65s ease-in-out infinite;
    }

    .intro-envelope::before,
    .intro-envelope::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 1.2rem;
      pointer-events: none;
    }

    .intro-envelope::before {
      background:
        linear-gradient(35deg, transparent 49%, #eb2e84 50% 54%, transparent 55%),
        linear-gradient(-35deg, transparent 49%, #eb2e84 50% 54%, transparent 55%);
    }

    .intro-envelope::after {
      clip-path: polygon(0 0, 50% 55%, 100% 0, 100% 100%, 0 100%);
      background: linear-gradient(180deg, rgba(246,228,174,.78), rgba(255,255,255,.06));
    }

    .intro-title {
      margin: 0;
      font-size: clamp(1.8rem, 8vw, 3rem);
      line-height: .98;
      font-weight: 900;
      letter-spacing: -.03em;
      text-shadow: 0 .25rem .8rem rgba(92,54,31,.26);
    }

    .intro-subtitle {
      margin: 0;
      max-width: 26ch;
      font-size: clamp(.95rem, 3.8vw, 1.15rem);
      font-weight: 700;
      color: rgba(255,255,255,.92);
    }

    .intro-skip {
      position: absolute;
      right: max(1rem, env(safe-area-inset-right));
      bottom: max(1rem, env(safe-area-inset-bottom));
      z-index: 4;
      border: 0;
      border-radius: 999px;
      padding: .68rem .95rem;
      color: #eb2e84;
      background: rgba(255,255,255,.92);
      font: 800 .88rem/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      box-shadow: 0 .55rem 1.2rem rgba(75, 42, 20, .22);
      cursor: pointer;
    }

    @keyframes curtainOpenLeft {
      0% { transform: translateX(0) skewX(0deg); }
      72% { transform: translateX(-88%) skewX(-4deg); }
      100% { transform: translateX(-112%) skewX(-2deg); }
    }

    @keyframes curtainOpenRight {
      0% { transform: translateX(0) skewX(0deg); }
      72% { transform: translateX(88%) skewX(4deg); }
      100% { transform: translateX(112%) skewX(2deg); }
    }

    @keyframes introOverlayFadeOut {
      0%, 74% { opacity: 1; visibility: visible; }
      99% { opacity: 0; visibility: visible; }
      100% { opacity: 0; visibility: hidden; pointer-events: none; }
    }

    @keyframes invitationReveal {
      0% { transform: scale(1.08) translateY(2.2%); filter: blur(8px) saturate(.95); }
      40% { transform: scale(1.045) translateY(1.3%); filter: blur(5px) saturate(.98); }
      75% { transform: scale(1.012) translateY(.35%); filter: blur(1px) saturate(1.02); }
      100% { transform: scale(1) translateY(0); filter: blur(0) saturate(1); }
    }

    @keyframes introCardOut {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-1rem) scale(.96); }
    }

    @keyframes envelopeBounce {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-.5rem) rotate(2deg); }
    }

    @keyframes introLeafFloat {
      0%, 100% { opacity: .48; }
      50% { opacity: .78; }
    }



    body:not(.intro-active) .intro-curtain,
    body:not(.intro-active) .curtain-panel,
    body:not(.intro-active) .intro-card,
    body:not(.intro-active) .invitation {
      animation: none !important;
    }

    body.intro-done .intro-curtain {
      display: none !important;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
      .intro-curtain { display: none !important; }
      body.intro-active .invitation { animation: none !important; transform: none !important; filter: none !important; }
    }
  </style>
</head>
<body>

  <div class="intro-curtain" aria-hidden="true">
    <div class="curtain-panel curtain-left"></div>
    <div class="curtain-panel curtain-right"></div>
    <span class="curtain-leaf leaf-a"></span>
    <span class="curtain-leaf leaf-b"></span>
    <span class="curtain-leaf leaf-c"></span>
    <span class="curtain-leaf leaf-d"></span>
    <div class="intro-card">
      <div class="intro-envelope"></div>
      <p class="intro-title">Mia cumple 1 año</p>
      <p class="intro-subtitle">Abriendo tu invitación</p>
    </div>
    <button class="intro-skip" type="button">Saltar</button>
  </div>

  <div class="page-shell">
    <main class="invitation" aria-label="Invitación de cumpleaños de Mia">
      <picture>
        <source srcset="assets/invitacion-mia-bg-645.webp 645w, assets/invitacion-mia-bg-1290.webp 1290w" type="image/webp" sizes="(max-width: 640px) 100vw, 520px" />
        <img class="invitation-bg" src="assets/invitacion-mia-bg-1290.png" alt="Invitación de cumpleaños de Mia" width="1290" height="2796" decoding="async" />
      </picture>

      <section class="map-card" aria-label="Mapa de ubicación de Salón Xalapa Kids">
        <iframe
          title="Mapa de ubicación: Salón Xalapa Kids"
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=Salon%20Xalapa%20Kids%20Calle%20Santo%20Domingo%20esquina%20Bogota%20Xalapa&output=embed">
        </iframe>
        <div class="map-soft-glow" aria-hidden="true"></div>
        <a class="location-button" href="https://maps.app.goo.gl/MfeqmTiZGzmGergo8" target="_blank" rel="noopener noreferrer" aria-label="Abrir ubicación en Google Maps">
          📍 Ubicación
        </a>
      </section>
    </main>
  </div>

  <script>
    (function () {
      const finishIntro = () => {
        document.body.classList.remove('intro-active');
        document.body.classList.add('intro-done');
        const intro = document.querySelector('.intro-curtain');
        if (intro) intro.remove();
      };

      const reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reducedMotion) {
        document.addEventListener('DOMContentLoaded', finishIntro, { once: true });
        return;
      }

      document.addEventListener('DOMContentLoaded', () => {
        const intro = document.querySelector('.intro-curtain');
        const skip = document.querySelector('.intro-skip');

        window.requestAnimationFrame(() => {
          window.setTimeout(() => document.body.classList.add('intro-active'), 90);
        });

        const timer = window.setTimeout(finishIntro, 4550);

        const skipNow = () => {
          window.clearTimeout(timer);
          finishIntro();
        };

        if (skip) skip.addEventListener('click', skipNow, { once: true });
        if (intro) {
          intro.addEventListener('click', (event) => {
            if (!event.target.closest('.intro-card')) skipNow();
          }, { once: true });
          intro.addEventListener('animationend', (event) => {
            if (event.animationName === 'introOverlayFadeOut') finishIntro();
          });
        }
      }, { once: true });
    })();
  </script>

</body>
